<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Web</title>
    <style>
        div {
            width: 300px;
            margin: 250px auto 0 auto;
        }

        .border {
            list-style: none;
            padding: 0;
        }

        .border li {
            font-family: "Trebuchet MS", "Lucida Sans";
            padding: 7px 20px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 10px solid #f05d22;
            box-shadow: 2px -2px 5px 0 rgba(0, 0, 0, .1),
            -2px -2px 5px 0 rgba(0, 0, 0, .1),
            2px 2px 5px 0 rgba(0, 0, 0, .1),
            -2px 2px 5px 0 rgba(0, 0, 0, .1);
            font-size: 20px;
            letter-spacing: 2px;
            transition: 0.2s all linear;
            cursor: pointer;
        }

        .border li:nth-child(2) {
            border-color: #8bc63e;
        }

        .border li:nth-child(3) {
            border-color: #fcba30;
        }

        .border li:nth-child(4) {
            border-color: #1ccfc9;
        }

        .border li:nth-child(5) {
            border-color: #493224;
        }

        .border li:hover {
            background-color: #f1efef;
            padding: 10px 20px;
        }

        .border li a {
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>
<div>
    <ul class="border">
        <li><a href="/html/admin.html">Admin page</a></li>
        <li><a href="/html/auth.html">SignIn page</a></li>
        <li><a href="/html/error.html">Error page</a></li>
    </ul>
</div>
</body>
</html>
